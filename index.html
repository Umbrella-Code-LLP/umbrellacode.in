<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Umbrella Code LLP builds consumer and technology products.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://umbrellacode.in/">
    <title>Umbrella Code LLP</title>
    <style>
        :root {
            --bg: #f8f9fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #4b5563;
            --accent: #0f766e;
            --border: #e5e7eb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 32%, var(--bg) 100%);
            color: var(--text);
            line-height: 1.6;
        }

        main {
            max-width: 820px;
            margin: 48px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.7rem, 3vw, 2.2rem);
            line-height: 1.25;
        }

        h2 {
            margin-top: 30px;
            font-size: 1.15rem;
        }

        p {
            margin: 0;
            color: var(--muted);
        }

        ul {
            margin: 10px 0 0;
            padding-left: 18px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        a:hover,
        a:focus {
            text-decoration: underline;
        }

        footer {
            margin-top: 22px;
            font-size: 0.92rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main>
        <section class="card" aria-label="Company overview">
            <h1>Umbrella Code LLP</h1>

            <p>
                Umbrella Code LLP is a software company building consumer and technology products.
            </p>

            <h2>Products</h2>
            <ul>
                <li>
                    <a href="https://www.marrymo.com">Marrymo</a>
                    &mdash;
                    <a href="https://play.google.com/store/apps/details?id=com.worktowed">Get it on Google Play</a>
                </li>
            </ul>

            <h2>Contact</h2>
            <p>
                <a href="mailto:admin@umbrellacode.in">admin@umbrellacode.in</a>
            </p>

            <footer>
                Copyright 2026 Umbrella Code LLP. All rights reserved.
            </footer>
        </section>
    </main>

    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "Organization",
            "name": "Umbrella Code LLP",
            "url": "https://umbrellacode.in/",
            "email": "admin@umbrellacode.in"
        }
    </script>
</body>
</html>
